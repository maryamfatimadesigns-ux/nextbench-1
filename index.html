<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nextbench</title>
    <meta name="description" content="The premiere verified student-to-student marketplace. Buy, sell, and trade within your trusted campus community." />
    <meta name="theme-color" content="#091A1D" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nextbench" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta property="og:title" content="Nextbench" />
    <meta property="og:description" content="Exclusive campus marketplace for verified students. Buy and sell with trust." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nextbench.in" />
    <style>
      /* Instant loading screen — shown before any JS runs */
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a1a1d;
        z-index: 9999;
        gap: 20px;
        transition: opacity 0.3s ease;
      }
      #app-loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #app-loading svg {
        width: 48px;
        height: 48px;
        animation: nb-spin 1.2s linear infinite;
      }
      #app-loading p {
        color: rgba(255,255,255,0.4);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
        letter-spacing: 0.05em;
        margin: 0;
      }
      @keyframes nb-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Instant loading screen: visible before React mounts -->
    <div id="app-loading">
      <svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="25" cy="25" r="20" stroke="rgba(255,255,255,0.1)" stroke-width="4"/>
        <path d="M25 5 A20 20 0 0 1 45 25" stroke="#4ECDC4" stroke-width="4" stroke-linecap="round"/>
      </svg>
      <p>Nextbench</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide the loading screen once React has mounted
      window.__hideAppLoading = function() {
        var el = document.getElementById('app-loading');
        if (el) {
          el.classList.add('hidden');
          setTimeout(function() { el.remove(); }, 350);
        }
      };
    </script>
  </body>
</html>
